<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🚗 Car Price Prediction</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🚗 Car Price Prediction</h1>
        <p class="subtitle">Fill in the car details to estimate its price</p>

        <form action="/predict" method="post">
            <label>Car Name:</label>
            <input type="text" name="name" required>

            <label>Year:</label>
            <input type="number" name="year" required>

            <label>Kilometers Driven:</label>
            <input type="number" name="km_driven" required>

            <label>Fuel Type:</label>
            <select name="fuel" required>
                <option value="Petrol">Petrol</option>
                <option value="Diesel">Diesel</option>
                <option value="CNG">CNG</option>
                <option value="Electric">Electric</option>
            </select>

            <label>Seller Type:</label>
            <select name="seller_type" required>
                <option value="Dealer">Dealer</option>
                <option value="Individual">Individual</option>
            </select>

            <label>Transmission:</label>
            <select name="transmission" required>
                <option value="Manual">Manual</option>
                <option value="Automatic">Automatic</option>
            </select>

            <label>Owner Type:</label>
            <select name="owner" required>
                <option value="First Owner">First Owner</option>
                <option value="Second Owner">Second Owner</option>
                <option value="Third Owner">Third Owner</option>
                <option value="Fourth & Above Owner">Fourth & Above Owner</option>
            </select>

            <label>Seats:</label>
            <input type="number" name="seats" required>

            <label>Max Power (bhp):</label>
            <input type="number" step="0.1" name="max_power" required>

            <label>Mileage Unit:</label>
            <select name="mileage_unit" required>
                <option value="kmpl">kmpl</option>
                <option value="km/kg">km/kg</option>
            </select>

            <label>Mileage:</label>
            <input type="number" step="0.1" name="mileage" required>

            <label>Engine CC:</label>
            <input type="number" name="engine_cc" required>

            <button type="submit">🚀 Predict Price</button>
        </form>

        {% if prediction_text %}
            <div class="result">
                <h2>{{ prediction_text }}</h2>
            </div>
        {% endif %}
    </div>
</body>
</html>
